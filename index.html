<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabadora de Aula Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg:#000; --card:#111; --text:#fff; --accent:#3d5afe; --danger:#ff5252; --success:#00e676; --warning:#ffea00; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin:0; padding:10px; }
        .app-card { width:100%; max-width:600px; margin:auto; background:var(--card); border-radius:15px; padding:20px; border:1px solid #333; }
        #timer { text-align: center; font-size: 3rem; margin: 10px 0; font-family: monospace; }
        #output { height:380px; border:1px solid #444; border-radius:10px; padding:15px; overflow-y:auto; background:#050505; margin-bottom:15px; font-size: 1.1rem; white-space: pre-wrap; color: #00e676; }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
        button { padding:18px; border:none; border-radius:10px; font-weight:bold; cursor: pointer; }
        .btn-start { background:var(--success); grid-column: span 2; color:#000; }
        .btn-pause { background:var(--warning); color:#000; }
        .btn-stop { background:var(--danger); color:#fff; }
        .btn-dl { background:var(--accent); color:#fff; grid-column: span 2; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <div id="timer">00:00:00</div>
    <div id="output">Escribe o dicta aquí...</div>

    <div class="grid">
        <button id="startBtn" class="btn-start">INICIAR GRABACIÓN Y TEXTO</button>
        <button id="pauseBtn" class="btn-pause" disabled>PAUSAR</button>
        <button id="stopBtn" class="btn-stop" disabled>DETENER</button>
        <button id="downloadBtn" class="btn-dl" style="display:none;">DESCARGAR TODO (.ZIP)</button>
    </div>
</div>

<script>
let mediaRecorder, chunks = [], recognition, startTime, timerId, elapsed = 0;
let isPaused = false;

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const stopBtn = document.getElementById("stopBtn");
const downloadBtn = document.getElementById("downloadBtn");
const output = document.getElementById("output");
const timerDisp = document.getElementById("timer");

// RECONOCIMIENTO NATIVO
const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
if (Speech) {
    recognition = new Speech();
    recognition.lang = 'es-CL';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
        let text = "";
        for (let i = 0; i < e.results.length; i++) {
            text += e.results[i][0].transcript + (e.results[i].isFinal ? ". " : "");
        }
        output.innerText = text; // Escribe directamente en la pantalla
        output.scrollTop = output.scrollHeight;
    };
    recognition.onend = () => { if(!isPaused && startBtn.disabled) recognition.start(); };
}

startBtn.onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.start();
        
        if (recognition) {
            output.innerText = "";
            recognition.start();
        }

        startTime = Date.now();
        timerId = setInterval(() => {
            const d = new Date(elapsed + (Date.now() - startTime));
            timerDisp.innerText = d.toISOString().substr(11, 8);
        }, 1000);

        startBtn.disabled = true; pauseBtn.disabled = false; stopBtn.disabled = false;
        downloadBtn.style.display = "none";
    } catch (err) { alert("Activa el micrófono"); }
};

pauseBtn.onclick = () => {
    if (!isPaused) {
        mediaRecorder.pause();
        if (recognition) recognition.stop();
        isPaused = true;
        clearInterval(timerId);
        elapsed += Date.now() - startTime;
        pauseBtn.innerText = "REANUDAR";
    } else {
        mediaRecorder.resume();
        if (recognition) recognition.start();
        isPaused = false;
        startTime = Date.now();
        timerId = setInterval(() => {
            const d = new Date(elapsed + (Date.now() - startTime));
            timerDisp.innerText = d.toISOString().substr(11, 8);
        }, 1000);
        pauseBtn.innerText = "PAUSAR";
    }
};

stopBtn.onclick = () => {
    mediaRecorder.stop();
    if (recognition) recognition.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    clearInterval(timerId);
    startBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true;
    downloadBtn.style.display = "block";
};

downloadBtn.onclick = async () => {
    const zip = new JSZip();
    const ts = Date.now();

    // AUDIO - Forzado como archivo de audio
    const audioBlob = new Blob(chunks, { type: 'audio/mp3' });
    zip.file(`Audio_${ts}.mp3`, audioBlob);

    // PDF - Captura lo que está escrito en el elemento 'output' ahora mismo
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFont("times", "bold");
    doc.text("Transcripción de Aula", 20, 20);
    doc.setFont("times", "normal");
    
    // ESTA LÍNEA ES LA CLAVE: Captura el texto visual directamente
    const textoParaGuardar = output.innerText; 
    const lines = doc.splitTextToSize(textoParaGuardar, 170);
    doc.text(lines, 20, 30);
    
    const pdfBlob = doc.output("blob");
    zip.file(`Texto_${ts}.pdf`, pdfBlob);

    const zipBlob = await zip.generateAsync({ type: "blob" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(zipBlob);
    a.download = `Clase_${ts}.zip`;
    a.click();
};
</script>
</body>
</html>
