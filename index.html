<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabadora de Aula Pro - Corregida</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg:#0b0b0b; --card:#1a1a1a; --text:#e0e0e0; --accent:#3d5afe; --danger:#ff5252; --success:#00e676; --warning:#ffea00; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin:0; padding:20px; }
        .app-card { width:100%; max-width:700px; margin:auto; background:var(--card); border-radius:15px; padding:25px; border:1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #timer { text-align: center; font-size: 3.5rem; margin: 15px 0; font-family: 'Courier New', Courier, monospace; color: var(--accent); }
        #output { height:350px; border:1px solid #444; border-radius:10px; padding:15px; overflow-y:auto; background:#050505; margin-bottom:15px; font-size: 1.1rem; white-space: pre-wrap; line-height: 1.5; color: #cfd8dc; }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        button { padding:15px; border:none; border-radius:8px; font-weight:bold; cursor: pointer; transition: opacity 0.2s; font-size: 0.9rem; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-start { background:var(--success); grid-column: span 2; color:#000; }
        .btn-pause { background:var(--warning); color:#000; }
        .btn-stop { background:var(--danger); color:#fff; }
        .btn-dl { background:var(--accent); color:#fff; grid-column: span 2; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-card">
    <h2 style="text-align:center; margin-top:0;">Grabadora de Aula Pro</h2>
    <div id="timer">00:00:00</div>
    <div id="output">El texto de la clase aparecerá aquí...</div>

    <div class="grid">
        <button id="startBtn" class="btn-start">INICIAR SESIÓN</button>
        <button id="pauseBtn" class="btn-pause" disabled>PAUSAR</button>
        <button id="stopBtn" class="btn-stop" disabled>FINALIZAR</button>
        <button id="downloadBtn" class="btn-dl" style="display:none;">DESCARGAR PAQUETE (.ZIP)</button>
    </div>
</div>

<script>
let mediaRecorder, chunks = [], recognition, startTime, timerId, elapsed = 0;
let isPaused = false;
let fullText = ""; // Almacena el texto definitivo

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const stopBtn = document.getElementById("stopBtn");
const downloadBtn = document.getElementById("downloadBtn");
const output = document.getElementById("output");
const timerDisp = document.getElementById("timer");

// CONFIGURACIÓN DE RECONOCIMIENTO DE VOZ
const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
if (Speech) {
    recognition = new Speech();
    recognition.lang = 'es-CL';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
        let interimTranscript = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
            const transcript = e.results[i][0].transcript;
            if (e.results[i].isFinal) {
                fullText += transcript + ". ";
            } else {
                interimTranscript += transcript;
            }
        }
        output.innerText = fullText + interimTranscript; 
        output.scrollTop = output.scrollHeight;
    };

    recognition.onend = () => { 
        if(!isPaused && startBtn.disabled) recognition.start(); 
    };
}

// INICIAR GRABACIÓN
startBtn.onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // Usamos webm que es el estándar nativo de MediaRecorder
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.start();
        
        if (recognition) {
            fullText = "";
            output.innerText = "";
            recognition.start();
        }

        startTime = Date.now();
        updateTimer();
        timerId = setInterval(updateTimer, 1000);

        startBtn.disabled = true; pauseBtn.disabled = false; stopBtn.disabled = false;
        downloadBtn.style.display = "none";
    } catch (err) { 
        alert("Error: Asegúrate de dar permisos al micrófono."); 
    }
};

function updateTimer() {
    const d = new Date(elapsed + (Date.now() - startTime));
    timerDisp.innerText = d.toISOString().substr(11, 8);
}

// PAUSAR / REANUDAR
pauseBtn.onclick = () => {
    if (!isPaused) {
        mediaRecorder.pause();
        if (recognition) recognition.stop();
        isPaused = true;
        clearInterval(timerId);
        elapsed += Date.now() - startTime;
        pauseBtn.innerText = "REANUDAR";
    } else {
        mediaRecorder.resume();
        if (recognition) recognition.start();
        isPaused = false;
        startTime = Date.now();
        timerId = setInterval(updateTimer, 1000);
        pauseBtn.innerText = "PAUSAR";
    }
};

// DETENER TODO
stopBtn.onclick = () => {
    mediaRecorder.stop();
    if (recognition) recognition.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    clearInterval(timerId);
    startBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true;
    downloadBtn.style.display = "block";
};

// DESCARGAR ZIP CON PDF Y AUDIO
downloadBtn.onclick = async () => {
    const zip = new JSZip();
    const ts = new Date().toISOString().replace(/[:.]/g, "-");

    // Guardar Audio como .webm (Formato real y funcional)
    const audioBlob = new Blob(chunks, { type: 'audio/webm' });
    zip.file(`Grabacion_${ts}.webm`, audioBlob);

    // Generar PDF con manejo de múltiples páginas
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const margin = 20;
    const pageWidth = doc.internal.pageSize.getWidth() - (margin * 2);
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.text("Transcripción de Clase", margin, 20);
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(12);
    
    const textoFinal = output.innerText;
    const splitText = doc.splitTextToSize(textoFinal, pageWidth);
    
    // Iniciar escritura en el PDF con salto de página automático
    let yPosition = 30;
    splitText.forEach(line => {
        if (yPosition > 280) { // Si llega al final de la página (A4 aprox 297mm)
            doc.addPage();
            yPosition = 20;
        }
        doc.text(line, margin, yPosition);
        yPosition += 7; // Espaciado entre líneas
    });

    const pdfBlob = doc.output("blob");
    zip.file(`Transcripcion_${ts}.pdf`, pdfBlob);

    // Generar y descargar ZIP
    const zipBlob = await zip.generateAsync({ type: "blob" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(zipBlob);
    a.download = `Clase_Pro_${ts}.zip`;
    a.click();
};
</script>
</body>
</html>
